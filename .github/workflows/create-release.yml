name: Create Release

on:
  workflow_dispatch:
    inputs:
      run_name:
        description: "Release name (e.g. 2026-04)"
        required: true
      results_dirs:
        description: |
          Results directories to include, one per line (relative to data/).
          Leave blank to auto-discover all NSForest results directories.
        required: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate release config
        env:
          RUN_NAME: ${{ inputs.run_name }}
          RESULTS_DIRS: ${{ inputs.results_dirs }}
        run: |
          args=(--run-name "$RUN_NAME")
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            args+=(--include "$line")
          done <<< "$RESULTS_DIRS"
          python scripts/release/generate_release.py "${args[@]}"

      - name: Commit release config
        env:
          RUN_NAME: ${{ inputs.run_name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prod/release/
          if ! git diff --cached --quiet; then
            git commit -m "release: add config for $RUN_NAME"
          else
            echo "No release-config changes to commit."
          fi

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          RUN_NAME: ${{ inputs.run_name }}
        run: |
          TAG="v${RUN_NAME}"
          git push origin HEAD:main
          gh release create "$TAG" \
            --title "Release ${RUN_NAME}" \
            --notes "Generated release config for run ${RUN_NAME}." \
            "data/prod/release/run-${RUN_NAME}.json" \
            "data/prod/release/results-sources-${RUN_NAME}.json" \
            "data/prod/release/release-${RUN_NAME}.zip"
