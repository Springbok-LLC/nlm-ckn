name: Package Production Data

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create tar.gz of data/prod
        env:
          FILENAME: "prod-data-${{ github.ref_name }}.tar.gz"
        run: |
          SAFE_FILENAME="${FILENAME//\//-}"
          tar -czf "$SAFE_FILENAME" data/prod/
          echo "FILENAME=$SAFE_FILENAME" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.FILENAME }}
